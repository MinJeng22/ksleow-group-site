name: Cleanup unused uploads

# Runs after content changes land on main. Scans src/content/*.json
# for /uploads/... references and deletes any file under public/uploads
# that nothing points to. The cleanup commit uses [skip ci] so this
# workflow doesn't trigger itself in a loop.

on:
  push:
    branches: [main]
    paths:
      - 'src/content/**'
      - 'public/uploads/**'
      - 'scripts/cleanup-uploads.js'
      - '.github/workflows/cleanup-unused-uploads.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run cleanup script
        run: node scripts/cleanup-uploads.js

      - name: Commit and push deletions if any
        run: |
          if [[ -z $(git status --porcelain) ]]; then
            echo "Nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: cleanup unused uploads [skip ci]"
          git push
