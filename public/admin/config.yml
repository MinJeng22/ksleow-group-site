# ─────────────────────────────────────────────────────────────
#  Decap CMS configuration — KSL Business Solutions
# ─────────────────────────────────────────────────────────────
#  Edits made in /admin commit JSON files in src/content/ to
#  GitHub. Vercel detects the push and rebuilds the site, so
#  changes appear live in ~30 seconds.
# ─────────────────────────────────────────────────────────────

backend:
  name: github
  repo: MinJeng22/ksl-business-solutions-site
  branch: main
  base_url: https://decap-oauth-proxy.kslbs.workers.dev
  auth_endpoint: oauth                  # matches /oauth route on the Worker

# Files uploaded via the CMS land in /public/images/ and are
# referenced from content as /images/<filename>.
media_folder: public/images
public_folder: /images

# Optional: turn on the editorial workflow for draft → review → publish.
# publish_mode: editorial_workflow

site_url: https://ksleow.com
display_url: https://ksleow.com
logo_url: /images/branding/logo-nav.png

collections:
  # ── Single-file collection: one form per homepage section ──
  - name: homepage
    label: Homepage Sections
    editor:
      preview: false
    files:
      # ───────── Brand Logos ─────────
      - file: src/content/branding.json
        name: branding
        label: Brand Logos (Nav, Hero, Footer)
        media_folder: "/public/images/branding"
        public_folder: "/images/branding"
        fields:
          - { name: navLogo,    label: "Navigation bar logo (leave empty to use bundled default)", widget: image, required: false }
          - { name: heroLogo,   label: "Hero (homepage banner) logo (leave empty to use bundled default)", widget: image, required: false }
          - { name: footerLogo, label: "Footer logo (leave empty to use bundled default)",         widget: image, required: false }
          - { name: serviceCardBack, label: "Service card back background image (geometric pattern)", widget: image, required: false }

      # ───────── Hero ─────────
      - file: src/content/hero.json
        name: hero
        label: Hero (Top Banner)
        fields:
          - { name: badge,               label: Top badge text,          widget: string }
          - { name: headline,            label: Headline (large white),  widget: string }
          - { name: tagline,             label: Italic tagline (gold),   widget: string }
          - { name: body,                label: Body paragraph,          widget: text }
          - { name: primaryButton,       label: Primary button label,    widget: string }
          - { name: secondaryButton,     label: Secondary button label,  widget: string }
          - { name: secondaryButtonHref, label: Secondary button link,   widget: string, default: "#services" }

      # ───────── Stats bar ─────────
      - file: src/content/stats.json
        name: stats
        label: Stats Bar
        fields:
          - name: items
            label: Statistics
            widget: list
            min: 1
            fields:
              - { name: num,     label: Number / Value, widget: string }
              - { name: label,   label: Caption,        widget: string }
              - { name: animate, label: "Animate from 0 to value when scrolled into view", widget: boolean, default: true, required: false }

      # ───────── Offices (companies that back each service card) ─────────
      - file: src/content/offices.json
        name: offices
        label: Offices / Companies (shown on service card backs)
        media_folder: "/public/images/offices"
        public_folder: "/images/offices"
        fields:
          - name: items
            label: Companies
            widget: list
            min: 1
            fields:
              - { name: key,     label: "Internal key (referenced by service cards — keep stable)", widget: string }
              - { name: name,    label: Company full name (UPPERCASE), widget: string }
              - { name: tagline, label: Short tagline shown above the name, widget: string, required: false }
              - { name: logo,    label: Company logo (shown on card back), widget: image, required: false }
              - name: phones
                label: Phone Numbers (Optional, up to 2)
                widget: list
                required: false
                max: 2
                fields:
                  - { name: number, label: Phone Number, widget: string }
              - name: emails
                label: Emails (Optional, up to 2)
                widget: list
                required: false
                max: 2
                fields:
                  - { name: email, label: Email Address, widget: string }
              - { name: facebook, label: Facebook Link (Optional), widget: string, required: false }
              - name: addresses
                label: Addresses (Optional, up to 2)
                widget: list
                required: false
                max: 2
                fields:
                  - { name: address, label: Address, widget: string }

      # ───────── Services ─────────
      - file: src/content/services.json
        name: services
        label: Services Section
        media_folder: "/public/images/services"
        public_folder: "/images/services"
        fields:
          - { name: eyebrow, label: Eyebrow (small gold text), widget: string }
          - { name: heading, label: Section heading,           widget: string }
          - { name: intro,   label: Intro paragraph,           widget: text }
          - name: items
            label: Service Cards
            widget: list
            min: 1
            fields:
              - { name: key,        label: Internal key (no spaces, links to contact info), widget: string }
              - { name: title,      label: Card title,                   widget: string }
              - { name: desc,       label: Card description,             widget: text }
              - { name: backgroundImage, label: Front card background image, widget: image, required: false }
              - { name: hideBadge,   label: Hide badge/logo area on front, widget: boolean, default: false, required: false }
              - name: officeKey
                label: "Office / Company shown on card back"
                widget: select
                required: false
                options:
                  - { label: "KSL Business Solutions Sdn. Bhd.",         value: ksl_bs }
                  - { label: "K.S. Leow Tax Consultant Sdn. Bhd.",       value: ksl_tax }
                  - { label: "K.S Leow Management Services Co. Sdn. Bhd.", value: ksl_mgmt }
                  - { label: "Kim & Co Chartered Accountants",           value: kim_co }
              - name: badgeType
                label: Badge type
                widget: select
                options:
                  - { label: "Authorized Dealer (gold)", value: dealer }
                  - { label: "Certified By (grey)",      value: certified }
                  - { label: "None / hidden",            value: none }
                default: dealer
              - { name: badgeLabel, label: Badge label text,             widget: string, default: "Authorized Dealer", required: false }
              - name: logos
                label: Badge logos
                widget: list
                required: false
                fields:
                  - { name: src, label: Logo image, widget: image }
                  - { name: hoverSrc, label: White logo (on hover), widget: image, required: false }
                  - { name: hoverH,   label: Hover Height (px), widget: number, required: false, value_type: int, min: 20, max: 120 }
                  - { name: alt, label: Alt text,   widget: string }
                  - { name: h,   label: Height (px), widget: number, default: 60, value_type: int, min: 20, max: 120 }

      # ───────── Products ─────────
      - file: src/content/products.json
        name: products
        label: Products Section
        media_folder: "/public/images/products"
        public_folder: "/images/products"
        fields:
          - { name: eyebrow, label: Eyebrow,         widget: string }
          - { name: heading, label: Section heading, widget: string }
          - { name: intro,   label: Intro paragraph, widget: text }
          - name: items
            label: Product Cards (carousel shows 4 on desktop and 2 on mobile)
            widget: list
            min: 1
            fields:
              - { name: name,        label: Product name,           widget: string }
              - { name: desc,        label: Description,            widget: text }
              - { name: image,       label: Logo image (sits on top of background), widget: image, required: false }
              - { name: background,  label: Lifestyle background photo (optional — shown behind logo with dark overlay), widget: image, required: false }
              - { name: placeholder, label: Emoji placeholder (used when no logo), widget: string, default: "📦" }
              - { name: gradient,    label: Background gradient CSS, widget: string, default: "linear-gradient(135deg, #2f315a 0%, #4a4d85 100%)" }
              - { name: route,       label: Internal link (optional, e.g. /products/autocount-accounting), widget: string, required: false }

      # ───────── Other Services ─────────
      - file: src/content/otherServices.json
        name: otherServices
        label: Other Services Section
        media_folder: "/public/images/other-services"
        public_folder: "/images/other-services"
        fields:
          - { name: eyebrow,  label: Eyebrow,         widget: string }
          - { name: heading,  label: Section heading, widget: string }
          - { name: intro,    label: Intro paragraph, widget: text }
          - { name: ctaLabel, label: Bottom button label, widget: string, default: "", required: false }
          - name: items
            label: Other Service Cards
            widget: list
            min: 1
            fields:
              - { name: key,   label: Internal key, widget: string }
              - { name: tag,   label: Tag line (small gold uppercase), widget: string }
              - { name: title, label: Title,        widget: string }
              - { name: desc,  label: Description,  widget: text }
              - { name: image, label: Cover image (optional), widget: image, required: false }
              - { name: route, label: Internal link (optional), widget: string, required: false }
              - { name: modal, label: Modal key (optional), widget: string, required: false }

      # ───────── Careers ─────────
      - file: src/content/careers.json
        name: careers
        label: Careers Section
        fields:
          - { name: eyebrow,           label: Eyebrow,                        widget: string }
          - { name: heading,           label: Heading / Quote,                widget: string }
          - { name: body,              label: Body paragraph,                 widget: text }
          - { name: careerButtonLabel, label: Career button label,            widget: string, default: "Join Our Team" }
          - { name: partnerButtonLabel,label: Partner button label,           widget: string, default: "Partner with Us" }
          - { name: partnerEmail,      label: Partner enquiry email address,  widget: string, default: "partner@ksleow.com.my", required: false }

      # ───────── Footer ─────────
      - file: src/content/footer.json
        name: footer
        label: Footer
        fields:
          - { name: tagline,         label: Brand tagline,      widget: text }
          - { name: contactHeading,  label: Contact heading,    widget: string, default: "Contact Us" }
          - { name: servicesHeading, label: Office heading,     widget: string, default: "Our Office" }
          - { name: followHeading,   label: Follow Us heading,  widget: string, default: "Follow Us" }
          - name: services
            label: Office / Company list
            widget: list
            fields:
              - { name: name, label: Company name (UPPERCASE), widget: string }
              - { name: brn,  label: "Business Registration No. (e.g. 198101004546 (70661-A))", widget: string, required: false }
          - { name: copyrightLine,   label: Copyright line (year is added automatically), widget: string }
          - { name: locationLine,    label: Location line,      widget: string }

  # AutoCount Plugin pages
  - name: autocountPlugins
    label: AutoCount Plugin
    editor:
      preview: false
    files:
      - file: src/content/autocountPlugins.json
        name: autocountPluginsCatalog
        label: AutoCount Plugin Catalog
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow,        label: Eyebrow, widget: string }
              - { name: title,          label: Title, widget: string }
              - { name: body,           label: Body, widget: text }
              - { name: primaryLabel,   label: Primary button label, widget: string }
              - { name: secondaryLabel, label: WhatsApp button label, widget: string }
          - name: intro
            label: Intro
            widget: object
            fields:
              - { name: eyebrow, label: Eyebrow, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: body,    label: Body, widget: text }
          - name: sections
            label: Plugin Sections
            widget: list
            fields:
              - { name: key,     label: Section key, widget: string }
              - { name: label,   label: Section label, widget: string }
              - { name: heading, label: Section heading, widget: string }
              - { name: body,    label: Section body, widget: text }
              - { name: empty,   label: Empty state text, widget: string }
              - name: items
                label: Plugins
                widget: list
                required: false
                fields:
                  - { name: name,     label: Plugin name, widget: string }
                  - { name: tag,      label: Tag, widget: string }
                  - { name: dealer,   label: Dealer / Developer, widget: string }
                  - { name: status,   label: Status, widget: string, default: "Available" }
                  - { name: summary,  label: Summary, widget: text }
                  - name: features
                    label: Features
                    widget: list
                    required: false
                    field: { name: feature, label: Feature, widget: string }
                  - name: modules
                    label: AutoCount modules
                    widget: list
                    required: false
                    field: { name: module, label: Module, widget: string }
                  - { name: route,    label: Internal route, widget: string, required: false }
                  - { name: ctaLabel, label: CTA label, widget: string, required: false }

      - file: src/content/sales2do.json
        name: sales2do
        label: Sales2DO Plugin Page
        media_folder: "/public/images/apps/sales2do"
        public_folder: "/images/apps/sales2do"
        fields:
          - name: hero
            label: Hero
            widget: object
            fields:
              - { name: eyebrow,        label: Eyebrow, widget: string }
              - { name: title,          label: Title, widget: string }
              - { name: body,           label: Body, widget: text }
              - { name: iconSrc,        label: Icon image (optional), widget: image, required: false }
              - { name: iconAlt,        label: Icon alt text, widget: string, required: false }
              - { name: primaryLabel,   label: Primary button label, widget: string }
              - { name: primaryHref,    label: Primary button link, widget: string }
              - { name: secondaryLabel, label: WhatsApp button label, widget: string }
          - name: overview
            label: Overview
            widget: object
            fields:
              - { name: label,   label: Label, widget: string }
              - { name: heading, label: Heading, widget: string }
          - name: outstanding
            label: Outstanding Delivery Order
            widget: object
            fields:
              - { name: label,        label: Label, widget: string }
              - { name: heading,      label: Heading, widget: string }
              - { name: image,        label: Screenshot (optional), widget: image, required: false }
              - { name: imageAlt,     label: Screenshot alt text, widget: string, required: false }
              - { name: imageCaption, label: Screenshot caption, widget: string, required: false }
              - { name: intro,        label: Intro (HTML allowed for bold), widget: text }
              - { name: filterTitle,  label: Filter title, widget: string }
              - name: filterItems
                label: Filter bullets
                widget: list
                field: { name: item, label: Bullet (HTML allowed), widget: text }
              - { name: drillTitle, label: Drill-down title, widget: string }
              - { name: drillIntro, label: Drill-down intro (HTML allowed), widget: text }
              - name: tierCards
                label: Tier cards
                widget: list
                fields:
                  - { name: tier,  label: Tier label, widget: string }
                  - { name: color, label: Badge color, widget: string, default: "#2f315a" }
                  - { name: title, label: Title, widget: string }
                  - name: items
                    label: Bullets
                    widget: list
                    field: { name: item, label: Bullet (HTML allowed), widget: text }
          - name: preset
            label: Preset Delivery
            widget: object
            fields:
              - { name: label,        label: Label, widget: string }
              - { name: heading,      label: Heading, widget: string }
              - { name: image,        label: Screenshot (optional), widget: image, required: false }
              - { name: imageAlt,     label: Screenshot alt text, widget: string, required: false }
              - { name: imageCaption, label: Screenshot caption, widget: string, required: false }
              - { name: intro,        label: Intro (HTML allowed), widget: text }
              - name: steps
                label: Steps
                widget: list
                field: { name: step, label: Step (HTML allowed), widget: text }
              - name: bulletItems
                label: Bullet items
                widget: list
                field: { name: item, label: Bullet (HTML allowed), widget: text }
              - { name: note, label: Note (HTML allowed), widget: text }
          - name: settings
            label: Plugin Settings
            widget: object
            fields:
              - { name: label,        label: Label, widget: string }
              - { name: heading,      label: Heading, widget: string }
              - { name: intro,        label: Intro (HTML allowed), widget: text }
              - { name: image,        label: Screenshot (optional), widget: image, required: false }
              - { name: imageAlt,     label: Screenshot alt text, widget: string, required: false }
              - { name: imageCaption, label: Screenshot caption, widget: string, required: false }
              - { name: transferTitle, label: Transfer remark title, widget: string }
              - { name: transferIntro, label: Transfer remark intro, widget: text }
              - name: transferItems
                label: Transfer remark bullets
                widget: list
                field: { name: item, label: Bullet (HTML allowed), widget: text }
              - { name: transferNote,  label: Transfer note (HTML allowed), widget: text }
              - { name: deliveryTitle, label: Delivery settings title, widget: string }
              - { name: deliveryIntro, label: Delivery settings intro (HTML allowed), widget: text }
              - name: deliveryItems
                label: Delivery settings bullets
                widget: list
                field: { name: item, label: Bullet (HTML allowed), widget: text }
          - name: license
            label: License Activation
            widget: object
            fields:
              - { name: label,   label: Label, widget: string }
              - { name: heading, label: Heading, widget: string }
              - { name: onlineTitle,   label: Online title, widget: string }
              - { name: onlineImage,   label: Online screenshot (optional), widget: image, required: false }
              - { name: onlineAlt,     label: Online screenshot alt text, widget: string, required: false }
              - { name: onlineCaption, label: Online screenshot caption, widget: string, required: false }
              - { name: onlineIntro,   label: Online intro, widget: text }
              - name: onlineSteps
                label: Online steps
                widget: list
                field: { name: step, label: Step (HTML allowed), widget: text }
              - { name: onlineNote, label: Online note (HTML allowed), widget: text }
              - { name: offlineTitle,   label: Offline title, widget: string }
              - { name: offlineImage,   label: Offline screenshot (optional), widget: image, required: false }
              - { name: offlineAlt,     label: Offline screenshot alt text, widget: string, required: false }
              - { name: offlineCaption, label: Offline screenshot caption, widget: string, required: false }
              - { name: offlineIntro,   label: Offline intro, widget: text }
              - name: offlineSteps
                label: Offline steps
                widget: list
                field: { name: step, label: Step (HTML allowed), widget: text }
              - { name: offlineNote, label: Offline note (HTML allowed), widget: text }
          - name: cta
            label: Bottom CTA
            widget: object
            fields:
              - { name: heading,     label: Heading, widget: string }
              - { name: body,        label: Body, widget: text }
              - { name: buttonLabel, label: Button label, widget: string }
