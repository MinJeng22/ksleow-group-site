<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" preserveAspectRatio="xMidYMid slice">
  <!-- Solid navy base -->
  <rect width="600" height="400" fill="#20255a"/>
  <!-- Tan / beige triangle in upper-right -->
  <polygon points="440,0 600,0 600,400 560,400" fill="#d8b685"/>
  <!-- Wider semi-transparent blue parallelogram (parallel to tan's hypotenuse) -->
  <polygon points="340,0 400,0 550,400 490,400" fill="#3a4080" fill-opacity="0.55"/>
  <!-- Narrower lighter parallelogram tucked inside the wider one -->
  <polygon points="385,0 420,0 575,400 540,400" fill="#5a6db5" fill-opacity="0.42"/>
</svg>
