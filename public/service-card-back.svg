<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 260" preserveAspectRatio="xMidYMid slice">
  <!-- Solid navy base -->
  <rect width="340" height="260" fill="#1d2050"/>
  <!-- Tan / beige triangle in upper-right -->
  <polygon points="215,0 340,0 340,260 290,260" fill="#d4a76a"/>
  <!-- Wider semi-transparent blue parallelogram (parallel to tan's hypotenuse) -->
  <polygon points="175,0 215,0 290,260 250,260" fill="#3c4e7d" fill-opacity="0.65"/>
  <!-- Narrower lighter parallelogram tucked inside the wider one -->
  <polygon points="205,0 232,0 310,260 282,260" fill="#647db9" fill-opacity="0.45"/>
</svg>
