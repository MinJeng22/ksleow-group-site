    <!--
    ═══════════════════════════════════════════════════════════════
    FAVICON  —  HOW TO UPDATE
    ───────────────────────────────────────────────────────────────
    WHY /public/?
    Vite only serves static URL paths from the /public folder.
    Files inside /src/assets/ are bundled — they cannot be used
    as a direct URL in <link href="...">.

    To replace the favicon:
      1. Export your icon as  favicon.webp  (512×512 px recommended)
      2. Drop it into the  /public/  folder at the project root
         (same level as package.json)
      3. Save. The browser picks it up automatically on next load.

    Optional extras — copy the same file with these names into /public/:
      favicon-32x32.webp   (32×32)
      apple-touch-icon.webp (180×180)
    ═══════════════════════════════════════════════════════════════
    -->
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  </head>
